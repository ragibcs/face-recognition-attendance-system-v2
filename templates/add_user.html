<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Add New User</title>

    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --secondary-color: #ec4899;
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .main-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 2rem;
            text-align: center;
        }

        #video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            border: 2px solid var(--border-color);
            aspect-ratio: 4/3;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .progress {
            height: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-top: 2rem;
        }

        .progress-bar {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
        }

        #status-text {
            margin-top: 1rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .btn-custom {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            border: none;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-weight: 500;
            font-size: 1rem;
            margin-top: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="glass-card">
            <h2 class="mb-2">Registering: <span style="color: var(--secondary-color);">{{ newusername }}</span></h2>
            <p class="text-muted mb-4">ID: {{ newuserid }}</p>

            <div id="video-container">
                <video id="video" autoplay playsinline></video>
            </div>

            <div class="progress">
                <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
            </div>
            <div id="status-text">Ready to capture...</div>

            <canvas id="canvas" style="display:none;"></canvas>

            <button id="startBtn" class="btn-custom" onclick="startCapture()">
                <i class="fas fa-camera me-2"></i>Start Capture
            </button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const startBtn = document.getElementById('startBtn');

        const username = "{{ newusername }}";
        const userid = "{{ newuserid }}";
        const TOTAL_IMAGES = 10;
        let capturedCount = 0;

        // Access Camera
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Error accessing camera: ", err);
                alert("Could not access camera. Please allow camera permissions.");
            });

        function startCapture() {
            startBtn.disabled = true;
            capturedCount = 0;
            captureStep();
        }

        function captureStep() {
            if (capturedCount >= TOTAL_IMAGES) {
                statusText.innerText = "Training Model...";
                progressBar.style.width = "100%";

                // Trigger Training
                fetch('/api/train_model', { method: 'POST' })
                    .then(() => {
                        window.location.href = "/";
                    })
                    .catch(err => alert("Error training model: " + err));
                return;
            }

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                let dataURL = canvas.toDataURL('image/jpeg');

                fetch('/api/add_face', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image: dataURL,
                        username: username,
                        userid: userid,
                        count: capturedCount
                    })
                })
                    .then(res => res.json())
                    .then(data => {
                        capturedCount++;
                        let percentage = (capturedCount / TOTAL_IMAGES) * 100;
                        progressBar.style.width = percentage + "%";
                        statusText.innerText = `Captured ${capturedCount}/${TOTAL_IMAGES}`;

                        // Small delay between captures
                        setTimeout(captureStep, 500);
                    })
                    .catch(err => {
                        console.error(err);
                        alert("Error uploading image");
                        startBtn.disabled = false;
                    });
            } else {
                // Retry if video not ready
                setTimeout(captureStep, 100);
            }
        }
    </script>
</body>

</html>
