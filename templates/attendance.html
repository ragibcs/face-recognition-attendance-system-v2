<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Take Attendance</title>

    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --secondary-color: #ec4899;
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .main-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 2rem;
            text-align: center;
        }

        #video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            border: 2px solid var(--border-color);
            aspect-ratio: 4/3;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #overlay-status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-custom {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            border: none;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-weight: 500;
            font-size: 1rem;
            margin-top: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary-custom {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-weight: 500;
            font-size: 1rem;
            margin-top: 1.5rem;
            margin-left: 1rem;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="glass-card">
            <h2 class="mb-4">Attendance Scanner</h2>

            <div id="video-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas-overlay"></canvas>
                <div id="overlay-status">Scanning...</div>
            </div>

            <canvas id="canvas" style="display:none;"></canvas>

            <div class="d-flex justify-content-center">
                <button id="toggleBtn" class="btn-custom" onclick="toggleScanning()">
                    <i class="fas fa-pause me-2"></i>Stop Scanning
                </button>
                <a href="/">
                    <button class="btn-secondary-custom">
                        <i class="fas fa-home me-2"></i>Home
                    </button>
                </a>
            </div>

            <div id="last-identified" class="mt-4 text-muted small">
                Last identified: <span id="identified-name">None</span>
            </div>
        </div>
    </div>

    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let overlayCanvas = document.getElementById('canvas-overlay');
        let overlayCtx = overlayCanvas.getContext('2d');

        let isScanning = true;
        let lastScanTime = 0;
        const SCAN_INTERVAL = 500; // Scan faster for smoother UI (500ms)

        // Access Camera
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Error accessing camera: ", err);
                alert("Could not access camera. Please allow camera permissions.");
            });

        function toggleScanning() {
            isScanning = !isScanning;
            const btn = document.getElementById('toggleBtn');
            if (isScanning) {
                btn.innerHTML = '<i class="fas fa-pause me-2"></i>Stop Scanning';
                btn.classList.add('btn-custom');
                btn.classList.remove('btn-secondary-custom'); // Visual toggle if needed
                requestAnimationFrame(scanFrame);
            } else {
                btn.innerHTML = '<i class="fas fa-play me-2"></i>Start Scanning';
                btn.classList.remove('btn-custom');
                btn.classList.add('btn-secondary-custom');

                // Clear overlay when stopped
                overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            }
        }

        function scanFrame(timestamp) {
            if (!isScanning) return;

            // Ensure overlay canvas matches video
            if (video.videoWidth && overlayCanvas.width !== video.videoWidth) {
                overlayCanvas.width = video.videoWidth;
                overlayCanvas.height = video.videoHeight;
            }

            if (timestamp - lastScanTime > SCAN_INTERVAL) {
                captureAndSend();
                lastScanTime = timestamp;
            }
            requestAnimationFrame(scanFrame);
        }

        function captureAndSend() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                let dataURL = canvas.toDataURL('image/jpeg');

                // Show visual feedback
                const overlay = document.getElementById('overlay-status');
                overlay.style.opacity = 0.5;

                fetch('/api/mark_attendance', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ image: dataURL })
                })
                    .then(response => response.json())
                    .then(data => {
                        setTimeout(() => overlay.style.opacity = 0, 300);

                        // Clear previous drawings
                        overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

                        if (data.status === 'success') {
                            document.getElementById('identified-name').innerText = data.user + " (" + data.time + ")";
                            document.getElementById('identified-name').style.color = '#4ade80'; // Green

                            // Draw Bounding Box & Name
                            if (data.face_location) {
                                const [x, y, w, h] = data.face_location;
                                const color = '#4ade80';

                                overlayCtx.beginPath();
                                overlayCtx.lineWidth = 4;
                                overlayCtx.strokeStyle = color;
                                overlayCtx.rect(x, y, w, h);
                                overlayCtx.stroke();

                                // Background for text
                                overlayCtx.fillStyle = color;
                                overlayCtx.fillRect(x, y - 30, w, 30);

                                // Text
                                overlayCtx.fillStyle = '#000000';
                                overlayCtx.font = 'bold 16px Inter, sans-serif';
                                overlayCtx.fillText(data.user, x + 5, y - 8);
                            }

                        } else {
                            document.getElementById('identified-name').innerText = "Unknown / No Face";
                            document.getElementById('identified-name').style.color = '#f87171'; // Red
                        }
                    })
                    .catch(err => console.error("Error sending frame:", err));
            }
        }

        // Start loop
        requestAnimationFrame(scanFrame);
    </script>
</body>

</html>
